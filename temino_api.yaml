openapi: 3.0.3
info:
  title: Temino API
  version: 1.0.0
  description: Backend API for Temino bus ticket booking platform.
paths:
  /api/accounts/login/:
    post:
      operationId: accounts_login_create
      description: Log in an existing user and return an auth token.
      tags:
      - accounts
      security:
      - tokenAuth: []
      - {}
      responses:
        '200':
          description: No response body
  /api/accounts/profile/:
    get:
      operationId: accounts_profile_retrieve
      description: Return the authenticated user's profile.
      tags:
      - accounts
      security:
      - tokenAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserProfile'
          description: ''
  /api/accounts/register/:
    post:
      operationId: accounts_register_create
      description: Register a new user.
      tags:
      - accounts
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserRegistration'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/UserRegistration'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/UserRegistration'
        required: true
      security:
      - tokenAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserRegistration'
          description: ''
  /api/bookings/:
    get:
      operationId: bookings_list
      parameters:
      - name: page
        required: false
        in: query
        description: A page number within the paginated result set.
        schema:
          type: integer
      tags:
      - bookings
      security:
      - tokenAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedBookingList'
          description: ''
  /api/bookings/{booking_id}/ticket/:
    get:
      operationId: bookings_ticket_retrieve
      parameters:
      - in: path
        name: booking_id
        schema:
          type: string
          format: uuid
        required: true
      tags:
      - bookings
      security:
      - tokenAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Ticket'
          description: ''
  /api/bookings/cancellation/approve/:
    post:
      operationId: bookings_cancellation_approve_create
      description: |-
        Approve a cancellation request.

        Important:
        This does not process payment gateway refunds.
        It only records admin approval and flags refund review.
      tags:
      - bookings
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Booking'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/Booking'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/Booking'
        required: true
      security:
      - tokenAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Booking'
          description: ''
  /api/bookings/cancellation/reject/:
    post:
      operationId: bookings_cancellation_reject_create
      description: Reject a cancellation request.
      tags:
      - bookings
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Booking'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/Booking'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/Booking'
        required: true
      security:
      - tokenAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Booking'
          description: ''
  /api/bookings/cancellation/request/:
    post:
      operationId: bookings_cancellation_request_create
      description: |-
        Submit a cancellation request.

        V1 policy:
        - Pending unpaid bookings are cancelled directly and seat is released.
        - Confirmed paid bookings are marked for manual cancellation/refund review.
        - No automatic refund is processed.
      tags:
      - bookings
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Booking'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/Booking'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/Booking'
        required: true
      security:
      - tokenAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Booking'
          description: ''
  /api/bookings/check-in/:
    post:
      operationId: bookings_check_in_create
      tags:
      - bookings
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TicketVerification'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/TicketVerification'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/TicketVerification'
        required: true
      security:
      - tokenAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TicketVerification'
          description: ''
  /api/bookings/create/:
    post:
      operationId: bookings_create_create
      description: |-
        Creates a new booking and reserves the selected seat temporarily.

        Important:
        The client does not control ticket price.
        Booking amount is calculated from trip.base_price inside create_booking().
      tags:
      - bookings
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Booking'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/Booking'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/Booking'
        required: true
      security:
      - tokenAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Booking'
          description: ''
  /api/bookings/mine/:
    get:
      operationId: bookings_mine_list
      parameters:
      - name: page
        required: false
        in: query
        description: A page number within the paginated result set.
        schema:
          type: integer
      tags:
      - bookings
      security:
      - tokenAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedBookingList'
          description: ''
  /api/bookings/operator/:

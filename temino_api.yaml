  /api/operators/dashboard/:
    get:
      operationId: operators_dashboard_retrieve
      description: |-
        Operator dashboard endpoint.

        Staff/admin:
        - sees the first operator by default for MVP dashboard testing.

        Operator manager:
        - sees only the first operator they manage.

        Future improvement:
        - support operator_id query parameter for staff/admin.
      tags:
      - operators
      security:
      - tokenAuth: []
      responses:
        '200':
          description: No response body

components:
  schemas:
    Booking:
      type: object
      description: General booking serializer used for booking list/create responses.
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        trip_code:
          type: string
          readOnly: true
        seat_number:
          type: string
          readOnly: true
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
        is_active:
          type: boolean
        booking_reference:
          type: string
          maxLength: 50
        passenger_name:
          type: string
          maxLength: 255
        passenger_phone:
          type: string
          maxLength: 20
        passenger_email:
          type: string
          format: email
          nullable: true
          maxLength: 254
        booking_status:
          $ref: '#/components/schemas/BookingStatusEnum'
        booking_channel:
          $ref: '#/components/schemas/BookingChannelEnum'
        amount:
          type: string
          format: decimal
          pattern: ^-?\d{0,8}(?:\.\d{0,2})?$
        fare_paid:
          type: string
          format: decimal
          pattern: ^-?\d{0,8}(?:\.\d{0,2})?$
        booking_lead_time_hours:
          type: integer
          maximum: 2147483647
          minimum: 0
          nullable: true
        payment_success:
          type: boolean
        cancellation_flag:
          type: boolean
        cancellation_requested:
          type: boolean
        cancellation_requested_at:
          type: string
          format: date-time
          nullable: true
        cancellation_reason:
          type: string
          nullable: true
        cancellation_review_status:
          $ref: '#/components/schemas/CancellationReviewStatusEnum'
        cancellation_reviewed_at:
          type: string
          format: date-time
          nullable: true
        cancellation_admin_notes:
          type: string
          nullable: true
        refund_required:
          type: boolean
          description: True when finance/admin should review a possible refund manually.
        refund_processed:
          type: boolean
          description: True only after refund has been manually processed outside
            Temino.
        refund_processed_at:
          type: string
          format: date-time
          nullable: true
        checked_in:
          type: boolean
        checked_in_at:
          type: string
          format: date-time
          nullable: true
        booked_at:
          type: string
          format: date-time
          readOnly: true
        confirmed_at:
          type: string
          format: date-time
          nullable: true
        cancelled_at:
          type: string
          format: date-time
          nullable: true
        user:
          type: integer
          nullable: true
        trip:
          type: string
          format: uuid
        seat:
          type: string
          format: uuid
          nullable: true
        cancellation_reviewed_by:
          type: integer
          nullable: true
      required:
      - amount
      - booked_at
      - booking_reference
      - created_at
      - id
      - passenger_name
      - passenger_phone
      - seat_number
      - trip
      - trip_code
      - updated_at
    BookingChannelEnum:
      enum:
      - web
      - mobile
      - agent
      - admin
      type: string
      description: |-
        * `web` - Web
        * `mobile` - Mobile
        * `agent` - Agent
        * `admin` - Admin
    BookingStatusEnum:
      enum:
      - pending
      - confirmed
      - cancelled
      - expired
      - completed
      type: string
      description: |-
        * `pending` - Pending
        * `confirmed` - Confirmed
        * `cancelled` - Cancelled
        * `expired` - Expired
        * `completed` - Completed
    Bus:
      type: object
      description: Serializer for buses.
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        operator_name:
          type: string
          readOnly: true
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
        is_active:
          type: boolean
        plate_number:
          type: string
          maxLength: 50
        bus_number:
          type: string
          nullable: true
          maxLength: 50
        bus_type:
          $ref: '#/components/schemas/BusTypeEnum'
        capacity:
          type: integer
          maximum: 2147483647
          minimum: 0
        manufacture_year:
          type: integer
          maximum: 2147483647
          minimum: 0
          nullable: true
        operator:
          type: string
          format: uuid
      required:
      - capacity
      - created_at
      - id
      - operator
      - operator_name
      - plate_number
      - updated_at
    BusTypeEnum:
      enum:
      - standard
      - executive
      - vip
      - mini_bus
      - coaster
      type: string
      description: |-
        * `standard` - Standard
        * `executive` - Executive
        * `vip` - VIP
        * `mini_bus` - Mini Bus
        * `coaster` - Coaster
    CancellationReviewStatusEnum:
      enum:
      - not_requested
      - requested
      - approved
      - rejected
      type: string
      description: |-
        * `not_requested` - Not Requested
        * `requested` - Requested
        * `approved` - Approved
        * `rejected` - Rejected
    City:
      type: object
      description: |-
        Legacy serializer.

        Kept temporarily for backward compatibility.
        New station onboarding should not depend on cities.
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        region_name:
          type: string
          readOnly: true
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
        is_active:
          type: boolean
        name:
          type: string

  /api/bookings/refund/mark-processed/:
    post:
      operationId: bookings_refund_mark_processed_create
      description: |-
        Mark a refund as manually processed.

        Important:
        This does not call Selcom or move money.
        It only records that finance/admin completed the refund outside Temino.
      tags:
      - bookings
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Booking'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/Booking'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/Booking'
        required: true
      security:
      - tokenAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Booking'
          description: ''
  /api/bookings/ticket/verify/:
    get:
      operationId: bookings_ticket_verify_retrieve
      tags:
      - bookings
      security:
      - tokenAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TicketVerification'
          description: ''
  /api/integrations/webhooks/operator/:
    post:
      operationId: integrations_webhooks_operator_create
      description: |-
        Receive webhook events from external operators.

        Event examples:
        - trip.updated
        - seat.updated
      tags:
      - integrations
      responses:
        '200':
          description: No response body
  /api/locations/cities/:
    get:
      operationId: locations_cities_list
      description: |-
        Legacy endpoint.

        Kept temporarily for backward compatibility.
        New Temino workflows should not depend on cities.
      parameters:
      - name: page
        required: false
        in: query
        description: A page number within the paginated result set.
        schema:
          type: integer
      tags:
      - locations
      security:
      - tokenAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedCityList'
          description: ''
  /api/locations/countries/:
    get:

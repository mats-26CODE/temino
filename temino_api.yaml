        name: id
        schema:
          type: string
          format: uuid
        required: true
      tags:
      - operators
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchedOperator'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PatchedOperator'
          multipart/form-data:
            schema:

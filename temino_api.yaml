  /api/operators/{id}/:
    get:
      operationId: operators_retrieve
      description: |-
        Retrieve or update a specific operator.

        Object-level access:
        - admin/superadmin can access any operator
        - operator_manager can access only their own operator
      parameters:
      - in: path
        name: id
        schema:
          type: string
          format: uuid
        required: true
      tags:
      - operators
      security:
      - tokenAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Operator'
          description: ''
    put:
      operationId: operators_update
      description: |-
        Retrieve or update a specific operator.

        Object-level access:
        - admin/superadmin can access any operator
        - operator_manager can access only their own operator
      parameters:
      - in: path
        name: id
        schema:
          type: string
          format: uuid
        required: true
      tags:
      - operators
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Operator'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/Operator'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/Operator'
        required: true
      security:
      - tokenAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Operator'
          description: ''
    patch:
      operationId: operators_partial_update
      description: |-
        Retrieve or update a specific operator.

        Object-level access:
        - admin/superadmin can access any operator
        - operator_manager can access only their own operator

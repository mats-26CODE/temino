openapi: 3.0.3
info:
  title: Temino API
  version: 1.0.0
  description: Backend API for Temino bus ticket booking platform.
paths:
  /api/accounts/login/:
    post:
      operationId: accounts_login_create
      description: Log in an existing user and return an auth token.
      tags:
      - accounts
      security:
      - tokenAuth: []
      - {}
      responses:
        '200':
          description: No response body
  /api/accounts/profile/:
    get:
      operationId: accounts_profile_retrieve
      description: Return the authenticated user's profile.
      tags:
      - accounts
      security:
      - tokenAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserProfile'
          description: ''
  /api/accounts/register/:
    post:
      operationId: accounts_register_create
      description: Register a new user.
      tags:
      - accounts
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserRegistration'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/UserRegistration'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/UserRegistration'
        required: true
      security:
      - tokenAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserRegistration'
          description: ''
  /api/bookings/:
    get:
      operationId: bookings_list
      description: |-
        Returns all bookings.

        Useful for admin/testing for now.
        Later this should be restricted to admin/operator roles.
      parameters:
      - name: page
        required: false
        in: query
        description: A page number within the paginated result set.
        schema:
          type: integer
      tags:
      - bookings
      security:
      - tokenAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedBookingList'
          description: ''
  /api/bookings/{booking_id}/ticket/:
    get:
      operationId: bookings_ticket_retrieve
      description: |-
        Returns final ticket/confirmation details for a booking.

        Frontend use case:
        GET /api/bookings/{booking_id}/ticket/

        This endpoint only returns ticket details after payment success.
      parameters:
      - in: path
        name: booking_id
        schema:
          type: string
          format: uuid
        required: true
      tags:
      - bookings
      security:
      - tokenAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Ticket'
          description: ''
  /api/bookings/create/:
    post:
      operationId: bookings_create_create
      description: Creates a new booking and reserves the selected seat temporarily.
      tags:
      - bookings
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Booking'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/Booking'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/Booking'
        required: true
      security:
      - tokenAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Booking'
          description: ''
  /api/bookings/mine/:
    get:
      operationId: bookings_mine_list
      description: Returns bookings belonging to the authenticated user.
      parameters:
      - name: page
        required: false
        in: query
        description: A page number within the paginated result set.
        schema:
          type: integer
      tags:
      - bookings
      security:
      - tokenAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedBookingList'
          description: ''
  /api/bookings/ticket/verify/:
    get:
      operationId: bookings_ticket_verify_retrieve
      description: |-
        Verify a ticket using booking reference from QR code.

        Example:
        GET /api/bookings/ticket/verify/?code=BK-12345678

        Frontend/operator use case:
        - scan QR code
        - extract booking reference or open verification URL
        - verify ticket status
      tags:
      - bookings
      security:
      - tokenAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TicketVerification'
          description: ''
  /api/locations/cities/:
    get:

                $ref: '#/components/schemas/PaginatedTripSeatList'
          description: ''
  /api/trips/create/:
    post:
      operationId: trips_create_create
      description: |-
        Create a new trip.

        Seats are auto-generated because of Step 9 logic.

        Allowed roles:
        - operator_manager
        - admin
        - superadmin
      tags:
      - trips
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Trip'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/Trip'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/Trip'
        required: true
      security:
      - tokenAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Trip'
          description: ''
  /api/trips/search/:
    get:
      operationId: trips_search_list
      description: |-
        Search endpoint for trips.

        Supported query parameters:
        - origin_station
        - destination_station
        - departure_date
        - operator
        - status
        - min_price
        - max_price
        - ordering

        Example:
        /api/trips/search/?origin_station=<uuid>&destination_station=<uuid>&departure_date=2026-04-08
        /api/trips/search/?operator=<uuid>&min_price=30000&max_price=50000
        /api/trips/search/?ordering=base_price
        /api/trips/search/?ordering=-departure_time
      parameters:
      - name: page
        required: false
        in: query
        description: A page number within the paginated result set.
        schema:
          type: integer
      tags:
      - trips
      security:
      - tokenAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedTripList'
          description: ''

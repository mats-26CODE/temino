        name: id
        schema:
          type: string
          format: uuid
        required: true
      tags:
      - operators
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Operator'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/Operator'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/Operator'
        required: true
      security:
